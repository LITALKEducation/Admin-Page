name = "litalkapi"
account_id = "aacf06eb2a3dcbf4fc501455805047d0"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# ROUTES — configured in the Cloudflare dashboard, NOT here.
#
# The public blog article page must be routed through this Worker so shared
# links get real Open Graph previews (the /blog-post handler in src/blog.ts
# rewrites the page's meta tags with the post's title/excerpt/cover).
# Add these two routes by hand once, under
# Workers & Pages → litalkapi → Settings → Domains & Routes → Add → Route:
#
#   litalkeducation.com/blog-post*        (zone: litalkeducation.com)
#   www.litalkeducation.com/blog-post*    (zone: litalkeducation.com)
#
# They are deliberately NOT declared as `routes = [...]` in this file: the
# CI deploy token (CLOUDFLARE_API_TOKEN in GitHub Secrets) only has
# account-level Workers permissions, and attaching zone routes from wrangler
# fails the whole deploy with "Authentication error [code: 10000]". If you
# later grant the token "Zone → Workers Routes → Edit" on the zone, the
# routes can move back into this file.

[[d1_databases]]
binding = "DB"
database_name = "litalk"
database_id = "77c10f96-55ba-4830-abcc-cd3364fb22f7"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "files-litalk"

[vars]
AUTH0_DOMAIN = "litalkeducation.us.auth0.com"
AUTH0_AUDIENCE = "https://admin.litalkeducation.com/files-api" # Auth0 API ID 6a475ce71d0772bca086a160
AUTH0_EMAIL_CLAIM = "https://admin.litalkeducation.com/email" # namespaced claim added by an Auth0 Action; falls back to `sub` if absent
AUTH0_NAME_CLAIM = "https://admin.litalkeducation.com/name"   # namespaced display-name claim; falls back to name/nickname/email
# Comma-separated: admin panel + public student site (both call this Worker)
ALLOWED_ORIGIN = "https://admin.litalkeducation.com,https://litalkeducation.com,https://www.litalkeducation.com"

# Custom domain routed to this same Worker, used only to make shareable file
# links look like the student-facing site instead of the workers.dev URL.
PUBLIC_FILES_ORIGIN = "https://istudent.litalkeducation.com"

# Login email for an auto-created student account is <studentId>@<this domain>.
# MUST match the convention the old GAS backend used (the student site derives
# the student id from the email's local part).
STUDENT_EMAIL_DOMAIN = "litalkeducation.com"
AUTH0_DB_CONNECTION = "LITALK-Student"

# Connection new teacher/staff accounts are created in (POST /staff). Falls
# back to AUTH0_DB_CONNECTION above if unset.
AUTH0_STAFF_CONNECTION = "Admin"

# Role ids assigned to accounts created via POST /staff — copy each from
# Auth0 Dashboard → User Management → Roles → [role] → the id in the URL.
# Role assignment is skipped (with a warning in the response) for any left
# unset, matching the graceful-degradation pattern used elsewhere.
AUTH0_ADMIN_ROLE_ID = "rol_a4boy0hKsG2tABpo"
AUTH0_TEACHER_ROLE_ID = "rol_su0AELJNGqQB8Yk7"
AUTH0_STAFF_ROLE_ID = "rol_ZoCzC7ZFmbjuwemu"

# Calendar a booking's Meet event is created on — see README. Booking still
# works without Google Meet configured; it just skips the link.
# GOOGLE_CALENDAR_ID = ""   # defaults to the authorized account's own "primary" calendar

# Secrets, NOT vars — set them with `npx wrangler secret put <NAME>`:
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET        (Stripe payment links)
#   AUTH0_MGMT_CLIENT_ID, AUTH0_MGMT_CLIENT_SECRET  (student/teacher/staff account management — see README)
#   GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_CLIENT_SECRET, GOOGLE_OAUTH_REFRESH_TOKEN (Google Meet auto-creation — see README)
#   GEMINI_API_KEY (AI chat assistant — worker/src/gemini.ts. Gemini Developer API key from
#     Google AI Studio (aistudio.google.com/apikey). Chat endpoints return 503 until this is set.)
